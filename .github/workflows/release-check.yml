name: Release Check

on:
  pull_request:
    branches: [main]

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version has changed
        run: |
          PR_VERSION=$(node -p "require('./package.json').version")
          BASE_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "::error::Version in package.json ($PR_VERSION) has not changed from main"
            exit 1
          fi
          echo "Version changed: $BASE_VERSION -> $PR_VERSION"
          echo "VERSION=$PR_VERSION" >> "$GITHUB_ENV"

      - name: Check release notes exist
        run: |
          if [ ! -f "release_notes/$VERSION.md" ]; then
            echo "::error::Missing release notes file: release_notes/$VERSION.md"
            exit 1
          fi
          echo "Found release notes: release_notes/$VERSION.md"
