name: BAMOE CI/CD Pipeline

on:
  push:
    branches:
      - '**'  # Triggers on all branch pushes (creation and updates)
  pull_request:
    types: [opened, synchronize, reopened]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx1024m'
  # JFrog Artifactory configuration - update ARTIFACTORY_URL with your actual URL
  ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL }}  # e.g., https://company.jfrog.io/artifactory/maven-repo

jobs:
  # ============================================
  # DISCOVER MAVEN PROJECTS
  # ============================================
  discover:
    name: Discover Projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.find-projects.outputs.projects }}
      project_count: ${{ steps.find-projects.outputs.project_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find Maven projects
        id: find-projects
        run: |
          # Find all pom.xml files and get their directories
          projects=()

          # Check for root pom.xml first
          if [ -f "pom.xml" ]; then
            projects+=(".")
          fi

          # Find pom.xml files in subdirectories (excluding nested target dirs)
          while IFS= read -r pom; do
            dir=$(dirname "$pom")
            # Skip if it's the root (already added) or inside a target directory
            if [ "$dir" != "." ] && [[ "$dir" != *"/target/"* ]] && [[ "$dir" != *"/target" ]]; then
              # Skip if parent directory already has a pom.xml (it's a submodule)
              parent=$(dirname "$dir")
              if [ ! -f "$parent/pom.xml" ] || [ "$parent" == "." ]; then
                projects+=("$dir")
              fi
            fi
          done < <(find . -name "pom.xml" -type f | sort)

          # Remove duplicates and convert to JSON array
          unique_projects=($(printf '%s\n' "${projects[@]}" | sort -u))
          json_array=$(printf '%s\n' "${unique_projects[@]}" | jq -R . | jq -s -c .)

          echo "projects=$json_array" >> $GITHUB_OUTPUT
          echo "project_count=${#unique_projects[@]}" >> $GITHUB_OUTPUT
          echo "Found ${#unique_projects[@]} Maven project(s): ${unique_projects[*]}"

