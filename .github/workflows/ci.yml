  # ============================================
  # CODE QUALITY ANALYSIS
  # ============================================
  code-quality:
    name: Code Quality (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: [discover]
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven settings for Artifactory
        run: mkdir -p ~/.m2 && cp .github/workflows/../maven-settings.xml ~/.m2/settings.xml

      - name: Run Checkstyle
        run: mvn -B checkstyle:check --file ${{ matrix.project }}/pom.xml
        continue-on-error: true
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          ARTIFACTORY_URL: ${{ env.ARTIFACTORY_URL }}

      - name: Run SpotBugs
        run: mvn -B spotbugs:check --file ${{ matrix.project }}/pom.xml
        continue-on-error: true
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          ARTIFACTORY_URL: ${{ env.ARTIFACTORY_URL }}

      - name: Run JaCoCo Coverage
        run: mvn -B jacoco:prepare-agent test jacoco:report --file ${{ matrix.project }}/pom.xml
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          ARTIFACTORY_URL: ${{ env.ARTIFACTORY_URL }}

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ hashFiles(format('{0}/pom.xml', matrix.project)) }}
          path: '${{ matrix.project }}/**/target/site/jacoco/'
          retention-days: 7

  # ============================================
  # SECURITY SCANNING
  # ============================================
  security:
    name: Security Scan (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: [discover]
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven settings for Artifactory
        run: mkdir -p ~/.m2 && cp .github/workflows/../maven-settings.xml ~/.m2/settings.xml

      - name: OWASP Dependency Check
        run: mvn -B org.owasp:dependency-check-maven:check --file ${{ matrix.project }}/pom.xml
        continue-on-error: true
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          ARTIFACTORY_URL: ${{ env.ARTIFACTORY_URL }}

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report-${{ hashFiles(format('{0}/pom.xml', matrix.project)) }}
          path: '${{ matrix.project }}/**/target/dependency-check-report.html'
          retention-days: 7

  # ============================================
  # BPMN/DMN VALIDATION
  # ============================================
  validate-models:
    name: Validate BPMN/DMN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for BPMN files
        id: bpmn-check
        run: |
          count=$(find . -name "*.bpmn" -o -name "*.bpmn2" | wc -l)
          echo "bpmn_count=$count" >> $GITHUB_OUTPUT
          echo "Found $count BPMN file(s)"

      - name: Check for DMN files
        id: dmn-check
        run: |
          count=$(find . -name "*.dmn" | wc -l)
          echo "dmn_count=$count" >> $GITHUB_OUTPUT
          echo "Found $count DMN file(s)"

      - name: Validate XML well-formedness
        run: |
          echo "Validating BPMN files..."
          find . -name "*.bpmn" -o -name "*.bpmn2" | while read file; do
            xmllint --noout "$file" && echo "✓ $file" || echo "✗ $file"
          done
          echo "Validating DMN files..."
          find . -name "*.dmn" | while read file; do
            xmllint --noout "$file" && echo "✓ $file" || echo "✗ $file"
          done

      - name: Summary
        run: |
          echo "## Model Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "- BPMN files: ${{ steps.bpmn-check.outputs.bpmn_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- DMN files: ${{ steps.dmn-check.outputs.dmn_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files by Directory" >> $GITHUB_STEP_SUMMARY
          echo "#### BPMN Files" >> $GITHUB_STEP_SUMMARY
          find . -name "*.bpmn" -o -name "*.bpmn2" | sed 's|^\./||' | sort | while read file; do
            echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "#### DMN Files" >> $GITHUB_STEP_SUMMARY
          find . -name "*.dmn" | sed 's|^\./||' | sort | while read file; do
            echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
          done

