  # PR STATUS CHECK
  # ============================================
  pr-check:
    name: PR Ready
    runs-on: ubuntu-latest
    needs: [discover, code-quality, security, validate-models]
    if: github.event_name == 'pull_request'

    steps:
      - name: All checks passed
        run: |
          echo "All CI checks passed! PR is ready for review."
          echo "Projects discovered: ${{ needs.discover.outputs.project_count }}"
