name: BAMOE CI/CD Pipeline

on:
  push:
    branches:
      - '**'  # Triggers on all branch pushes (creation and updates)
  pull_request:
    types: [opened, synchronize, reopened]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  # ============================================
  # BUILD AND TEST
  # ============================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        run: mvn -B clean verify --file pom.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
          retention-days: 7

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/target/*.jar
            **/target/*.war
            **/target/*.kjar
          retention-days: 14

  # ============================================
  # CODE QUALITY ANALYSIS
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle
        run: mvn -B checkstyle:check --file pom.xml
        continue-on-error: true

      - name: Run SpotBugs
        run: mvn -B spotbugs:check --file pom.xml
        continue-on-error: true

      - name: Run JaCoCo Coverage
        run: mvn -B jacoco:prepare-agent test jacoco:report --file pom.xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/target/site/jacoco/'
          retention-days: 7

  # ============================================
  # SECURITY SCANNING
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: OWASP Dependency Check
        run: mvn -B org.owasp:dependency-check-maven:check --file pom.xml
        continue-on-error: true

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: '**/target/dependency-check-report.html'
          retention-days: 7

  # ============================================
  # BPMN/DMN VALIDATION
  # ============================================
  validate-models:
    name: Validate BPMN/DMN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for BPMN files
        id: bpmn-check
        run: |
          count=$(find . -name "*.bpmn" -o -name "*.bpmn2" | wc -l)
          echo "bpmn_count=$count" >> $GITHUB_OUTPUT
          echo "Found $count BPMN file(s)"

      - name: Check for DMN files
        id: dmn-check
        run: |
          count=$(find . -name "*.dmn" | wc -l)
          echo "dmn_count=$count" >> $GITHUB_OUTPUT
          echo "Found $count DMN file(s)"

      - name: Validate XML well-formedness
        run: |
          echo "Validating BPMN files..."
          find . -name "*.bpmn" -o -name "*.bpmn2" | while read file; do
            xmllint --noout "$file" && echo "✓ $file" || echo "✗ $file"
          done
          echo "Validating DMN files..."
          find . -name "*.dmn" | while read file; do
            xmllint --noout "$file" && echo "✓ $file" || echo "✗ $file"
          done

      - name: Summary
        run: |
          echo "## Model Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "- BPMN files: ${{ steps.bpmn-check.outputs.bpmn_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- DMN files: ${{ steps.dmn-check.outputs.dmn_count }}" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # DEPLOY TO MAVEN REPOSITORY
  # ============================================
  deploy:
    name: Deploy Artifacts
    runs-on: ubuntu-latest
    needs: [build, code-quality, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: maven-releases
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Deploy to Maven Repository
        run: mvn -B deploy -DskipTests --file pom.xml
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

  # ============================================
  # PR STATUS CHECK
  # ============================================
  pr-check:
    name: PR Ready
    runs-on: ubuntu-latest
    needs: [build, code-quality, security, validate-models]
    if: github.event_name == 'pull_request'

    steps:
      - name: All checks passed
        run: echo "All CI checks passed! PR is ready for review."
